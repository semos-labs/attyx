name: Test

on:
  push:
    branches: [main, "release-*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        # windows-latest temporarily disabled
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libfreetype-dev libfontconfig-dev libgl-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Windows runs are temporarily disabled (see matrix above). Re-enable this
      # step along with windows-latest — it's a linker workaround for stale cache.
      # - name: Clean stale cache (Windows linker workaround)
      #   if: runner.os == 'Windows'
      #   run: if (Test-Path .zig-cache) { Remove-Item -Recurse -Force .zig-cache }
      #   shell: pwsh

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build
