name: Test

on:
  push:
    branches: [main, "release-*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libfreetype-dev libfontconfig-dev libgl-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clean stale cache (Windows linker workaround)
        if: runner.os == 'Windows'
        run: if (Test-Path .zig-cache) { Remove-Item -Recurse -Force .zig-cache }
        shell: pwsh

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        if: runner.os != 'Windows'
        run: zig build
