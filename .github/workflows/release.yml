name: Release

on:
  push:
    tags: ["v*"]
    branches: ["release-*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_REPO: semos-labs/attyx

permissions:
  contents: write

jobs:
  # ── Resolve which GitHub Release to attach artifacts to ──
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      upload_url: ${{ steps.resolve.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve target release
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If triggered by a tag push, use that tag directly.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Resolved: tag push → $TAG"
            exit 0
          fi

          # Triggered by branch push — extract base version from branch name.
          # Branch format: release-X.Y.Z
          BRANCH="${GITHUB_REF#refs/heads/}"
          BASE_VERSION="${BRANCH#release-}"

          if [ -z "$BASE_VERSION" ]; then
            echo "ERROR: could not extract version from branch $BRANCH"
            exit 1
          fi

          echo "Branch: $BRANCH, base version: $BASE_VERSION"

          # Check for a stable draft release first (v0.2.48)
          STABLE_TAG="v${BASE_VERSION}"
          DRAFT=$(gh release view "$STABLE_TAG" --repo "$GITHUB_REPO" --json isDraft,tagName -q 'select(.isDraft) | .tagName' 2>/dev/null || echo "")
          if [ -n "$DRAFT" ]; then
            echo "release_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"
            echo "Resolved: draft release → $STABLE_TAG"
            exit 0
          fi

          # Otherwise find the latest RC release for this version
          LATEST_RC=$(gh release list --repo "$GITHUB_REPO" --limit 50 --json tagName,isPrerelease \
            -q "[.[] | select(.isPrerelease and (.tagName | startswith(\"v${BASE_VERSION}-rc\"))) | .tagName] | sort | last // empty")

          if [ -n "$LATEST_RC" ]; then
            echo "release_tag=$LATEST_RC" >> "$GITHUB_OUTPUT"
            echo "Resolved: latest RC → $LATEST_RC"
            exit 0
          fi

          echo "ERROR: no release found for version $BASE_VERSION"
          exit 1

  # ── macOS ──
  build-macos:
    needs: resolve-release
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            artifact: attyx-darwin-arm64.zip
            dmg: attyx-darwin-arm64.dmg
          - target: darwin-x64
            runner: macos-15-intel
            artifact: attyx-darwin-x64.zip
            dmg: attyx-darwin-x64.dmg

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          for f in ${{ matrix.artifact }} ${{ matrix.dmg }}; do
            gh release delete-asset "$RELEASE_TAG" "$f" --repo "$GITHUB_REPO" --yes 2>/dev/null || true
          done

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-${{ matrix.target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Build
        timeout-minutes: 30
        run: zig build -Doptimize=ReleaseFast -Denv=production

      - name: Strip binary
        run: strip zig-out/bin/attyx

      - name: Set minimum macOS version to 12.0
        run: vtool -set-build-version macos 12.0 15.0 -replace -output zig-out/bin/attyx zig-out/bin/attyx

      - name: Create .icns from PNG
        run: |
          mkdir -p Attyx.iconset
          sips -z 16 16     images/Attyx.png --out Attyx.iconset/icon_16x16.png
          sips -z 32 32     images/Attyx.png --out Attyx.iconset/icon_16x16@2x.png
          sips -z 32 32     images/Attyx.png --out Attyx.iconset/icon_32x32.png
          sips -z 64 64     images/Attyx.png --out Attyx.iconset/icon_32x32@2x.png
          sips -z 128 128   images/Attyx.png --out Attyx.iconset/icon_128x128.png
          sips -z 256 256   images/Attyx.png --out Attyx.iconset/icon_128x128@2x.png
          sips -z 256 256   images/Attyx.png --out Attyx.iconset/icon_256x256.png
          sips -z 512 512   images/Attyx.png --out Attyx.iconset/icon_256x256@2x.png
          sips -z 512 512   images/Attyx.png --out Attyx.iconset/icon_512x512.png
          sips -z 1024 1024 images/Attyx.png --out Attyx.iconset/icon_512x512@2x.png
          iconutil -c icns Attyx.iconset -o Attyx.icns

      - name: Patch Info.plist version from tag
        run: |
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          VERSION="${TAG#v}"
          BUNDLE_VERSION="${VERSION%%-rc*}"
          sed -i '' "s|<key>CFBundleVersion</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleVersion</key>\n    <string>${BUNDLE_VERSION}</string>|" resources/Info.plist
          sed -i '' "s|<key>CFBundleShortVersionString</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleShortVersionString</key>\n    <string>${BUNDLE_VERSION}</string>|" resources/Info.plist

      - name: Create .app bundle
        run: |
          mkdir -p Attyx.app/Contents/MacOS
          mkdir -p Attyx.app/Contents/Resources
          cp zig-out/bin/attyx Attyx.app/Contents/MacOS/attyx
          cp Attyx.icns Attyx.app/Contents/Resources/Attyx.icns
          cp resources/Info.plist Attyx.app/Contents/Info.plist

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX)
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_FILE="/tmp/build-$(openssl rand -hex 8).keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"

      - name: Codesign .app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_TEAM_ID" \
            --entitlements resources/Attyx.entitlements \
            --timestamp \
            Attyx.app

      - name: Package .app as zip
        run: ditto -c -k --keepParent Attyx.app ${{ matrix.artifact }}

      - name: Notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool submit ${{ matrix.artifact }} \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple Attyx.app
          ditto -c -k --keepParent Attyx.app ${{ matrix.artifact }}

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R Attyx.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Attyx" -srcfolder dmg-staging -ov -format UDZO ${{ matrix.dmg }}

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit ${{ matrix.dmg }} \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple ${{ matrix.dmg }}

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" ${{ matrix.artifact }} ${{ matrix.dmg }} --repo "$GITHUB_REPO" --clobber

  # ── Linux ──
  build-linux:
    needs: resolve-release
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            artifact: attyx-linux-x64.tar.zst
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: attyx-linux-arm64.tar.zst

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          gh release delete-asset "$RELEASE_TAG" "${{ matrix.artifact }}" --repo "$GITHUB_REPO" --yes 2>/dev/null || true

      - name: Install Linux GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libfreetype-dev libfontconfig-dev libgl-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dcpu=baseline -Denv=production

      - name: Strip binary
        run: strip zig-out/bin/attyx

      - name: Package binary
        run: |
          mkdir -p staging
          cp zig-out/bin/attyx staging/attyx
          cp images/attyx.desktop staging/attyx.desktop
          cp images/Attyx.png staging/attyx.png
          cd staging
          tar --zstd -cf ../${{ matrix.artifact }} attyx attyx.desktop attyx.png

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" ${{ matrix.artifact }} --repo "$GITHUB_REPO" --clobber

  # ── Windows ──
  build-windows:
    needs: resolve-release
    strategy:
      matrix:
        include:
          - target: windows-arm64
            zig_target: aarch64-windows
            runner: windows-latest
          - target: windows-x64
            zig_target: x86_64-windows
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        shell: bash
        run: |
          for f in attyx-${{ matrix.target }}.exe attyx-${{ matrix.target }}-setup.exe attyx-${{ matrix.target }}-setup.zip; do
            gh release delete-asset "$RELEASE_TAG" "$f" --repo "$GITHUB_REPO" --yes 2>/dev/null || true
          done

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-${{ matrix.target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Build attyx
        run: zig build -Doptimize=ReleaseFast -Denv=production -Dtarget=${{ matrix.zig_target }}

      - name: Build installer
        run: zig build installer -Doptimize=ReleaseFast -Denv=production -Dtarget=${{ matrix.zig_target }}

      - name: Fetch MSYS2 sysroot
        shell: pwsh
        run: |
          $sysroot = "zig-out\bin\share\msys2"
          if (-not (Test-Path "$sysroot\usr\bin\zsh.exe")) {
            powershell -ExecutionPolicy Bypass -File scripts\fetch-msys2-sysroot.ps1 -OutputDir $sysroot
          }

      - name: Package bare exe (for auto-updater)
        run: |
          copy zig-out\bin\attyx.exe attyx-${{ matrix.target }}.exe

      - name: Build self-extracting installer
        shell: pwsh
        run: |
          # Create payload zip with attyx.exe, uninstaller, and sysroot
          $payload = "payload-staging"
          New-Item -ItemType Directory $payload -Force | Out-Null
          Copy-Item zig-out\bin\attyx.exe "$payload\attyx.exe"
          Copy-Item zig-out\bin\attyx-uninstall.exe "$payload\attyx-uninstall.exe"
          if (Test-Path "zig-out\bin\share\msys2") {
            Copy-Item "zig-out\bin\share\msys2" "$payload\share\msys2" -Recurse -Force
          }
          Push-Location $payload
          tar.exe -a -cf ..\payload.zip *
          Pop-Location
          # Concatenate: setup exe + payload zip = self-extracting installer
          cmd /c "copy /b zig-out\bin\attyx-setup.exe + payload.zip attyx-${{ matrix.target }}-setup.exe"

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        shell: bash
        run: |
          gh release upload "$RELEASE_TAG" attyx-${{ matrix.target }}.exe attyx-${{ matrix.target }}-setup.exe --repo "$GITHUB_REPO" --clobber
