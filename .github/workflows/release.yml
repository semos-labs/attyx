name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

env:
  GITHUB_REPO: semos-labs/attyx
  HOMEBREW_TAP: semos-labs/homebrew-tap

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            artifact: attyx-darwin-arm64.zip
            dmg: attyx-darwin-arm64.dmg
          - target: darwin-x64
            runner: macos-15-intel
            artifact: attyx-darwin-x64.zip
            dmg: attyx-darwin-x64.dmg

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-${{ matrix.target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Build
        timeout-minutes: 30
        run: zig build -Doptimize=ReleaseFast -Denv=production

      - name: Set minimum macOS version to 13.0
        run: vtool -set-build-version macos 13.0 15.0 -replace -output zig-out/bin/attyx zig-out/bin/attyx

      - name: Create .icns from PNG
        run: |
          mkdir -p Attyx.iconset
          sips -z 16 16     images/Attyx.png --out Attyx.iconset/icon_16x16.png
          sips -z 32 32     images/Attyx.png --out Attyx.iconset/icon_16x16@2x.png
          sips -z 32 32     images/Attyx.png --out Attyx.iconset/icon_32x32.png
          sips -z 64 64     images/Attyx.png --out Attyx.iconset/icon_32x32@2x.png
          sips -z 128 128   images/Attyx.png --out Attyx.iconset/icon_128x128.png
          sips -z 256 256   images/Attyx.png --out Attyx.iconset/icon_128x128@2x.png
          sips -z 256 256   images/Attyx.png --out Attyx.iconset/icon_256x256.png
          sips -z 512 512   images/Attyx.png --out Attyx.iconset/icon_256x256@2x.png
          sips -z 512 512   images/Attyx.png --out Attyx.iconset/icon_512x512.png
          sips -z 1024 1024 images/Attyx.png --out Attyx.iconset/icon_512x512@2x.png
          iconutil -c icns Attyx.iconset -o Attyx.icns

      - name: Patch Info.plist version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip any -rcN suffix for CFBundleVersion (macOS requires X.Y.Z)
          BUNDLE_VERSION="${VERSION%%-rc*}"
          sed -i '' "s|<key>CFBundleVersion</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleVersion</key>\n    <string>${BUNDLE_VERSION}</string>|" resources/Info.plist
          sed -i '' "s|<key>CFBundleShortVersionString</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleShortVersionString</key>\n    <string>${BUNDLE_VERSION}</string>|" resources/Info.plist

      - name: Create .app bundle
        run: |
          mkdir -p Attyx.app/Contents/MacOS
          mkdir -p Attyx.app/Contents/Resources
          mkdir -p Attyx.app/Contents/Frameworks
          cp zig-out/bin/attyx Attyx.app/Contents/MacOS/attyx
          cp Attyx.icns Attyx.app/Contents/Resources/Attyx.icns
          cp resources/Info.plist Attyx.app/Contents/Info.plist
          cp -R vendor/Sparkle.framework Attyx.app/Contents/Frameworks/Sparkle.framework

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX)
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_FILE="/tmp/build-$(openssl rand -hex 8).keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"

      - name: Codesign Sparkle.framework
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --deep --options runtime \
            --sign "$APPLE_TEAM_ID" \
            --timestamp \
            Attyx.app/Contents/Frameworks/Sparkle.framework

      - name: Codesign .app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_TEAM_ID" \
            --timestamp \
            Attyx.app

      - name: Package .app as zip
        run: ditto -c -k --keepParent Attyx.app ${{ matrix.artifact }}

      - name: Notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool submit ${{ matrix.artifact }} \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple Attyx.app
          ditto -c -k --keepParent Attyx.app ${{ matrix.artifact }}

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R Attyx.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Attyx" -srcfolder dmg-staging -ov -format UDZO ${{ matrix.dmg }}

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit ${{ matrix.dmg }} \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple ${{ matrix.dmg }}

      - name: EdDSA sign release zip for Sparkle
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          echo "$SPARKLE_EDDSA_KEY" > "$KEY_FILE"
          RAW=$(vendor/bin/sign_update "${{ matrix.artifact }}" -f "$KEY_FILE")
          rm -f "$KEY_FILE"
          echo "$RAW"
          SIGNATURE=$(echo "$RAW" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$SIGNATURE" ]; then
            SIGNATURE="$RAW"
          fi
          echo "$SIGNATURE" > sparkle-signature.txt

      - name: Upload Sparkle signature
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-${{ matrix.target }}
          path: sparkle-signature.txt

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.dmg }}

  build-linux:
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            artifact: attyx-linux-x64.tar.zst
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: attyx-linux-arm64.tar.zst

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libfreetype-dev libfontconfig-dev libgl-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dcpu=baseline -Denv=production

      - name: Strip binary
        run: strip zig-out/bin/attyx

      - name: Package binary
        run: |
          mkdir -p staging
          cp zig-out/bin/attyx staging/attyx
          cp images/attyx.desktop staging/attyx.desktop
          cp images/Attyx.png staging/attyx.png
          cd staging
          tar --zstd -cf ../${{ matrix.artifact }} attyx attyx.desktop attyx.png

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  snap:
    needs: [build-linux]
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: attyx-linux-x64.tar.zst
            runner: ubuntu-latest
          - arch: arm64
            artifact: attyx-linux-arm64.tar.zst
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPO" \
            --pattern "${{ matrix.artifact }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binary
        run: tar --zstd -xf ${{ matrix.artifact }}

      - name: Set snap version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: .*/version: '$VERSION'/" snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build
        with:
          snapcraft-args: --platform ${{ matrix.arch }}

      - name: Upload to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge

  homebrew:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        run: sleep 30

      - name: Download release assets
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPO" \
            --pattern "attyx-*" \
            --dir assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          cd assets
          echo "darwin_arm64=$(sha256sum attyx-darwin-arm64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(sha256sum attyx-darwin-x64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum attyx-linux-x64.tar.zst | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum attyx-linux-arm64.tar.zst | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Dispatch Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ env.HOMEBREW_TAP }}
          event-type: update-formula-attyx
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "tag": "${{ github.ref_name }}",
              "darwin_arm64_sha256": "${{ steps.checksums.outputs.darwin_arm64 }}",
              "darwin_x64_sha256": "${{ steps.checksums.outputs.darwin_x64 }}",
              "linux_x64_sha256": "${{ steps.checksums.outputs.linux_x64 }}",
              "linux_arm64_sha256": "${{ steps.checksums.outputs.linux_arm64 }}"
            }

      - name: Step summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release ${{ github.ref_name }}

          | Platform | SHA256 |
          |----------|--------|
          | darwin-arm64 | \`${{ steps.checksums.outputs.darwin_arm64 }}\` |
          | darwin-x64 | \`${{ steps.checksums.outputs.darwin_x64 }}\` |
          | linux-x64 | \`${{ steps.checksums.outputs.linux_x64 }}\` |
          | linux-arm64 | \`${{ steps.checksums.outputs.linux_arm64 }}\` |
          EOF

  appcast:
    needs: [build-macos]
    runs-on: ubuntu-latest
    env:
      SEMOS_WEBSITE: semos-labs/semos
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_VERSION="${VERSION%%-rc*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bundle_version=$BUNDLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle signatures
        uses: actions/download-artifact@v4
        with:
          pattern: sparkle-*
          merge-multiple: false

      - name: Wait for release assets
        run: sleep 30

      - name: Download macOS release zips
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPO" \
            --pattern "attyx-darwin-*.zip" \
            --dir assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate appcast XML files
        run: |
          ARM64_SIG=$(cat sparkle-darwin-arm64/sparkle-signature.txt)
          X64_SIG=$(cat sparkle-darwin-x64/sparkle-signature.txt)
          ARM64_SIZE=$(stat -c%s assets/attyx-darwin-arm64.zip)
          X64_SIZE=$(stat -c%s assets/attyx-darwin-x64.zip)
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_VERSION="${{ steps.version.outputs.bundle_version }}"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S %z')
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPO}/releases/download/${GITHUB_REF_NAME}"

          cat > appcast-arm64.xml <<FEED
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Attyx (Apple Silicon)</title>
              <link>https://semos.sh</link>
              <description>Attyx auto-update feed for Apple Silicon</description>
              <language>en</language>
              <item>
                <title>Attyx v${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_BASE}/attyx-darwin-arm64.zip"
                  sparkle:version="${BUNDLE_VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${ARM64_SIG}"
                  length="${ARM64_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          FEED

          cat > appcast-x64.xml <<FEED
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Attyx (Intel)</title>
              <link>https://semos.sh</link>
              <description>Attyx auto-update feed for Intel</description>
              <language>en</language>
              <item>
                <title>Attyx v${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_BASE}/attyx-darwin-x64.zip"
                  sparkle:version="${BUNDLE_VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${X64_SIG}"
                  length="${X64_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          FEED

      - name: Push appcast files to semos website
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${SEMOS_WEBSITE}.git" semos-site
          cp appcast-arm64.xml semos-site/public/appcast-arm64.xml
          cp appcast-x64.xml semos-site/public/appcast-x64.xml
          cd semos-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/appcast-arm64.xml public/appcast-x64.xml
          git diff --cached --quiet || git commit -m "chore: update appcast for ${GITHUB_REF_NAME}"
          git push

  publish:
    needs: [build-macos, build-linux, homebrew, appcast]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPO" \
            --draft=false \
            --latest
